spring.datasource.url=jdbc:h2:mem:authdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=TestJwtSecretKeyThatIsAtLeast32CharactersLongForTestsOnly123
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=86400000

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

management.tracing.enabled=false
pharmacy.events.rabbit.enabled=false
spring.rabbitmq.dynamic=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

otp.expiration-minutes=10
otp.max-attempts=3
otp.length=6
otp.rate-limit-max=3
otp.rate-limit-window-minutes=60
verification.token.expiration-hours=24
app.base-url=http://localhost:8081
