spring.application.name=catalog-service
spring.main.lazy-initialization=true
server.port=8082
server.tomcat.threads.max=10

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pharmacy_catalog_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET:qBc8HQhVL9u+uBUPltUg8arrAZFVcSWDocPzkWmAKmc=}

app.upload.dir=${UPLOAD_DIR:uploads/prescriptions}
app.upload.medicine-images.dir=${MEDICINE_IMAGE_UPLOAD_DIR:uploads/medicine-images}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/api-docs/swagger-config
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka}@localhost:8761/eureka}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.missing-queues-fatal=false
pharmacy.events.exchange=${PHARMACY_EVENTS_EXCHANGE:pharmacy.events.exchange}
pharmacy.events.rabbit.enabled=${PHARMACY_EVENTS_ENABLED:true}
pharmacy.events.outbox.fixed-delay-ms=${PHARMACY_OUTBOX_FIXED_DELAY_MS:5000}
pharmacy.events.outbox.batch-size=${PHARMACY_OUTBOX_BATCH_SIZE:50}
pharmacy.events.outbox.max-attempts=${PHARMACY_OUTBOX_MAX_ATTEMPTS:10}
pharmacy.events.outbox.retry-delay-seconds=${PHARMACY_OUTBOX_RETRY_DELAY_SECONDS:15}

management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

observability.loki.enabled=${LOKI_ENABLED:true}
observability.loki.url=${LOKI_URL:http://localhost:3100/loki/api/v1/push}

logging.level.root=ERROR
logging.level.org.springframework=ERROR

jwt.revocation.enabled=${JWT_REVOCATION_ENABLED:false}
jwt.revocation.jti-prefix=${JWT_REVOCATION_JTI_PREFIX:jwt:revoked:jti:}
jwt.revocation.hash-prefix=${JWT_REVOCATION_HASH_PREFIX:jwt:revoked:hash:}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

spring.data.redis.repositories.enabled=false

app.seed.enabled=${APP_SEED_ENABLED:true}
