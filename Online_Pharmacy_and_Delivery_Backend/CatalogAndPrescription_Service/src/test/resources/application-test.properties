spring.datasource.url=jdbc:h2:mem:catalogdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=ThisIsADevOnlyJwtSecretKeyForHS256SigningAtLeast32BytesLong123456
app.upload.dir=target/test-uploads
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

management.tracing.enabled=false
pharmacy.events.rabbit.enabled=false
spring.rabbitmq.dynamic=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false
