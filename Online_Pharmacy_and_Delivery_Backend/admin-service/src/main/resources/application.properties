server.port=8084
server.tomcat.threads.max=10
spring.application.name=admin-service
spring.main.lazy-initialization=false

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pharmacy_admin_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:qBc8HQhVL9u+uBUPltUg8arrAZFVcSWDocPzkWmAKmc=}
jwt.expiration=${JWT_EXPIRATION:86400000}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/api-docs/swagger-config
springdoc.swagger-ui.operationsSorter=method

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

observability.loki.enabled=${LOKI_ENABLED:true}
observability.loki.url=${LOKI_URL:http://localhost:3100/loki/api/v1/push}

logging.level.com.pharmacy=${APP_LOG_LEVEL:INFO}
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.org.springframework.security=ERROR
logging.level.org.hibernate.SQL=${SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${SQL_BIND_LOG_LEVEL:WARN}

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka}@localhost:8761/eureka}

spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.client.config.order-service.connect-timeout=3000
spring.cloud.openfeign.client.config.order-service.read-timeout=5000
spring.cloud.openfeign.client.config.catalog-service.connect-timeout=3000
spring.cloud.openfeign.client.config.catalog-service.read-timeout=5000
spring.cloud.openfeign.client.config.auth-service.connect-timeout=3000
spring.cloud.openfeign.client.config.auth-service.read-timeout=5000

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.dynamic=true
spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.listener.simple.default-requeue-rejected=false

pharmacy.events.exchange=${PHARMACY_EVENTS_EXCHANGE:pharmacy.events.exchange}
pharmacy.events.dlx=${PHARMACY_EVENTS_DLX:pharmacy.events.dlx}
pharmacy.events.dlq.suffix=${PHARMACY_EVENTS_DLQ_SUFFIX:.dlq}
pharmacy.events.rabbit.enabled=${PHARMACY_EVENTS_ENABLED:true}
pharmacy.events.queues.order-created=${PHARMACY_QUEUE_ORDER_CREATED:pharmacy.admin.order-created}
pharmacy.events.queues.payment-succeeded=${PHARMACY_QUEUE_PAYMENT_SUCCEEDED:pharmacy.admin.payment-succeeded}
pharmacy.events.queues.payment-failed=${PHARMACY_QUEUE_PAYMENT_FAILED:pharmacy.admin.payment-failed}
pharmacy.events.queues.prescription-reviewed=${PHARMACY_QUEUE_PRESCRIPTION_REVIEWED:pharmacy.admin.prescription-reviewed}
pharmacy.events.queues.order-status-changed=${PHARMACY_QUEUE_ORDER_STATUS_CHANGED:pharmacy.admin.order-status-changed}
pharmacy.events.queues.inventory-adjusted=${PHARMACY_QUEUE_INVENTORY_ADJUSTED:pharmacy.admin.inventory-adjusted}

resilience4j.circuitbreaker.instances.order-service.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.order-service.sliding-window-size=20
resilience4j.circuitbreaker.instances.order-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.order-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.order-service.wait-duration-in-open-state=15s
resilience4j.timelimiter.instances.order-service.timeout-duration=5s
resilience4j.circuitbreaker.instances.catalog-service.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.catalog-service.sliding-window-size=20
resilience4j.circuitbreaker.instances.catalog-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.catalog-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.catalog-service.wait-duration-in-open-state=15s
resilience4j.timelimiter.instances.catalog-service.timeout-duration=5s
resilience4j.circuitbreaker.instances.auth-service.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=20
resilience4j.circuitbreaker.instances.auth-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=15s
resilience4j.timelimiter.instances.auth-service.timeout-duration=5s

jwt.revocation.enabled=${JWT_REVOCATION_ENABLED:false}
jwt.revocation.jti-prefix=${JWT_REVOCATION_JTI_PREFIX:jwt:revoked:jti:}
jwt.revocation.hash-prefix=${JWT_REVOCATION_HASH_PREFIX:jwt:revoked:hash:}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

spring.data.redis.repositories.enabled=false
